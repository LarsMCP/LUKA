{% extends "base.html" %}
{% block title %}Passwort ändern – LUKA{% endblock %}
{% block appbar_title %}Passwort ändern{% endblock %}
{% block appbar_nav %}
<a href="/aufgaben"><span class="icon">arrow_back</span> Zurück</a>
{% endblock %}
{% block content %}
<div class="card">
  <form id="pw-form">
    <label for="current">Aktuelles Passwort</label>
    <input type="password" id="current" autocomplete="off" required>

    <label for="new1">Neues Passwort</label>
    <input type="password" id="new1" autocomplete="off" required>

    <label for="new2">Neues Passwort wiederholen</label>
    <input type="password" id="new2" autocomplete="off" required>

    <button type="submit">Speichern</button>
    <div class="error" id="error" hidden></div>
    <div class="success-text" id="ok" hidden>Passwort geändert ✓</div>
  </form>
</div>

<script>
  const form = document.getElementById("pw-form");
  const errorBox = document.getElementById("error");
  const okBox = document.getElementById("ok");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.hidden = true;
    okBox.hidden = true;
    const cur = document.getElementById("current").value;
    const n1 = document.getElementById("new1").value;
    const n2 = document.getElementById("new2").value;
    if (n1 !== n2) {
      errorBox.textContent = "Die neuen Passwörter stimmen nicht überein.";
      errorBox.hidden = false;
      return;
    }
    try {
      const res = await fetch("/api/password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ current_password: cur, new_password: n1 }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || "Änderung fehlgeschlagen");
      }
      form.reset();
      okBox.hidden = false;
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.hidden = false;
    }
  });
</script>
{% endblock %}
