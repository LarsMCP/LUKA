{% extends "admin_base.html" %}
{% block title %}QR-Code – {{ klass.name }}{% endblock %}
{% block admin %}
<style>
  @media print {
    .luka-topbar, hr, .no-print { display: none !important; }
    body { margin: 0; }
  }
  .qr-card { text-align: center; max-width: 420px; margin: 1rem auto; }
  .qr-card img { width: 320px; height: 320px; }
  .qr-code { font-size: 1.6rem; letter-spacing: 0.15em; font-weight: 700; }
</style>

<div class="qr-card">
  <h1>{{ klass.name }}</h1>
  <p class="subject">Mit dem Handy scannen, um der Klasse beizutreten:</p>
  <img src="/admin/classes/{{ klass.id }}/qr.svg" alt="QR-Code für {{ klass.name }}">
  <p>Klassen-Code: <span class="qr-code">{{ klass.join_code }}</span></p>
  <p class="subject">{{ join_url }}</p>
  <p class="no-print"><button onclick="window.print()">Drucken</button></p>
</div>
{% endblock %}
