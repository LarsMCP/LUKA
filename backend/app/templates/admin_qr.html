{% extends "admin_base.html" %}
{% block title %}QR-Code – {{ klass.name }}{% endblock %}
{% block admin %}
<div class="card qr-card">
  <h1>{{ klass.name }}</h1>
  <p class="subject">Mit dem Handy scannen, um der Klasse beizutreten:</p>
  <span class="qr-chip">
    <img src="/admin/classes/{{ klass.id }}/qr.svg" alt="QR-Code für {{ klass.name }}" class="qr-card__img">
  </span>
  <p>Klassen-Code: <span class="qr-code">{{ klass.join_code }}</span></p>
  <p class="subject">{{ join_url }}</p>
  <p class="no-print"><button onclick="window.print()"><span class="icon">print</span> Drucken</button></p>
</div>
{% endblock %}
