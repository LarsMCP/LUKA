<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LUKA{% endblock %}</title>
  <style>
    :root { --blue: #2563eb; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; color: #111; }
    h1 { font-size: 1.6rem; }
    a { color: var(--blue); }
    .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 1rem 1.25rem; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
    input[type=text] { width: 100%; box-sizing: border-box; font-size: 1rem; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 6px; }
    button { background: var(--blue); color: #fff; border: 0; border-radius: 6px; padding: 0.6rem 1.1rem; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
    .error { color: #dc2626; margin-top: 0.75rem; }
    ul.tasks { list-style: none; padding: 0; }
    ul.tasks li { border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.6rem; }
    .subject { color: #6b7280; font-size: 0.9rem; }
    .topbar { display: flex; justify-content: space-between; align-items: center; }
    .badge { font-size: 0.8rem; font-weight: 600; padding: 0.15rem 0.6rem; border-radius: 999px; white-space: nowrap; }
    .badge-done { background: #dcfce7; color: #166534; }
    .badge-open { background: #f1f5f9; color: #64748b; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
