<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}LUKA{% endblock %}</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script>
    // Vor dem ersten Rendern anwenden, um ein Aufblitzen des falschen
    // Farbschemas (FOUC) zu vermeiden. Ohne gespeicherte Präferenz greift
    // automatisch prefers-color-scheme (siehe styles.css).
    (function () {
      try {
        var saved = localStorage.getItem("luka-theme");
        if (saved === "light" || saved === "dark") {
          document.documentElement.setAttribute("data-theme", saved);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="app-bar">
    <span class="app-bar__title">{% block appbar_title %}LUKA{% endblock %}</span>
    <nav class="app-bar__nav">
      {% block appbar_nav %}{% endblock %}
      <button type="button" id="theme-toggle" class="icon-btn" title="Farbschema wechseln" aria-label="Hell-/Dunkel-Modus wechseln">
        <span class="icon" id="theme-toggle-icon">dark_mode</span>
      </button>
    </nav>
  </header>
  <main class="page{% block page_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      var mql = window.matchMedia("(prefers-color-scheme: dark)");
      function getSaved() {
        try { return localStorage.getItem("luka-theme"); } catch (e) { return null; }
      }
      function isDark() {
        var saved = getSaved();
        if (saved === "dark") return true;
        if (saved === "light") return false;
        return mql.matches;
      }
      function updateIcon() {
        var icon = document.getElementById("theme-toggle-icon");
        if (icon) icon.textContent = isDark() ? "light_mode" : "dark_mode";
      }
      updateIcon();
      var btn = document.getElementById("theme-toggle");
      if (btn) {
        btn.addEventListener("click", function () {
          var next = isDark() ? "light" : "dark";
          try { localStorage.setItem("luka-theme", next); } catch (e) {}
          document.documentElement.setAttribute("data-theme", next);
          updateIcon();
        });
      }
    })();

    // QR-Code zum Vergrößern anklickbar machen (z.B. in der Klassenliste).
    document.addEventListener("click", function (e) {
      var chip = e.target.closest(".qr-chip");
      if (chip) chip.classList.toggle("is-zoomed");
    });
  </script>
</body>
</html>
